name: "Bug report"
description: "Report a bug"
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks. Please fill out the form as precisely as possible.

        If the bug involves private proxies or tokens, remove secrets from logs before submitting.

  - type: dropdown
    id: area
    attributes:
      label: Problem area
      description: Where does the bug happen?
      options:
        - Xray/Mihomo checker
        - MTProto checker
        - Subscription parsing / sources.json / --file
        - Aggregator
        - Updater / VERSION / self-update
        - Xray/Mihomo installer
        - Menu / CLI
        - Documentation / README
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is broken?
      description: Briefly describe the problem.
      placeholder: When running with --file and sources.json, some subscription URLs are passed to requests with a trailing quote.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can this be reproduced?
      placeholder: |
        1. Run `python v2rayChecker.py -f sources.json`
        2. Select mode ...
        3. Check the log ...
        4. Observe the error ...
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Subscription URLs should be fetched without extra trailing characters.
    validations:
      required: true

  - type: dropdown
    id: input_mode
    attributes:
      label: Input mode
      options:
        - --file
        - --url
        - --agg
        - reuse output
        - interactive menu
        - not sure
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Mode / engine
      options:
        - auto
        - xray
        - mihomo
        - mtproto
        - not applicable
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MK_XRAYchecker version
      description: For example `1.3.1`
      placeholder: "1.3.1"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: OS and runtime
      description: For example `Windows 11, Python 3.12, running from repo` or `OpenWRT, packaged run`
      placeholder: "Windows 11, Python 3.12"
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Log / traceback / stderr
      description: Paste only the relevant part.
      render: shell
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config / input sample
      description: Provide a minimal reproducible fragment of `config.json`, `sources.json`, or the input file with secrets removed.
      render: json

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else that may help investigate the issue.
